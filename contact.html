<!DOCTYPE html>
<html>
<head>
<title>Contact Us | ASR Studio</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
<div class="logo">ASR Studio</div>
</header>

<section class="services" style="margin-top:120px">

<h2>Contact Us</h2>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<input type="text"
name="name"
placeholder="Your Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="tel"
name="phone"
placeholder="Phone">

<textarea
name="message"
placeholder="Your Message"
rows="6"></textarea>

<button type="submit">
Send Message
</button>

</form>

</section>

</body>
</html>
